<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor V50.1 - 10 Levels</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
        }

        .game-container {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 1px solid #334155;
        }

        h2 { color: #fbbf24; font-size: 1.2rem; margin-bottom: 10px; }
        .time-display { font-size: 14px; color: #94a3b8; margin-bottom: 15px; font-weight: bold; }

        /* Grid 5x5 */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            background-color: #0f172a;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .cell {
            aspect-ratio: 1/1;
            background-color: #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #475569;
            transition: 0.2s;
        }

        .cell.active {
            background-color: #ef4444;
            color: white;
            box-shadow: 0 0 12px #ef4444;
            transform: scale(1.05);
        }

        /* Niveau de jeu - 10 Levels */
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 isaky ny laharana */
            gap: 5px;
            margin-bottom: 20px;
        }

        .level-btn {
            background-color: #334155;
            border: none;
            color: white;
            padding: 8px 0;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .level-btn.active {
            background-color: #fbbf24;
            color: #0f172a;
            font-weight: bold;
        }

        /* Button & Results */
        .predict-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            color: #0f172a;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .results {
            background-color: #0f172a;
            padding: 12px;
            border-radius: 10px;
            text-align: left;
        }
        .results p { margin: 4px 0; font-size: 14px; }
        .results span { color: #10b981; float: right; font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-container">
        <h2>MI MINE PREDICTOR V50.1</h2>
        <div class="time-display" id="current-time">00:00:00</div>

        <div id="grid" class="grid-layout"></div>

        <p style="font-size: 13px; color: #94a3b8; margin-bottom: 8px;">Niveau de jeu (Isan'ny vanja):</p>
        <div class="levels-grid" id="levels-btns"></div>

        <button class="predict-btn" onclick="generatePrediction()">Prediction</button>

        <div class="results">
            <p>Côte Moyen: <span id="cote-moyen">0.00</span></p>
            <p>Côte Max: <span id="cote-max">0.00</span></p>
        </div>
    </div>

    <script>
        let currentMines = 2;

        // 24h Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = 
                now.toLocaleTimeString('fr-FR', { hour12: false });
        }, 1000);

        // Build 5x5 Grid
        const grid = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = '★';
            cell.id = `cell-${i}`;
            grid.appendChild(cell);
        }

        // Build 10 Level Buttons
        const levelsContainer = document.getElementById('levels-btns');
        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = i === 2 ? 'level-btn active' : 'level-btn';
            btn.innerText = i;
            btn.onclick = function() {
                currentMines = i;
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            };
            levelsContainer.appendChild(btn);
        }

        function generatePrediction() {
            // Reset
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('active');
                c.innerText = '★';
            });

            // Random Pick
            let chosen = [];
            while(chosen.length < currentMines) {
                let r = Math.floor(Math.random() * 25);
                if(!chosen.includes(r)) chosen.push(r);
            }

            // Show Result
            setTimeout(() => {
                chosen.forEach(id => {
                    const cell = document.getElementById(`cell-${id}`);
                    cell.classList.add('active');
                    cell.innerText = '💣';
                });

                // Cote Logic
                let base = currentMines * 1.4;
                let moy = (Math.random() * base + (currentMines * 1.1)).toFixed(2);
                let max = (parseFloat(moy) * (Math.random() * 2 + 1.5)).toFixed(2);

                document.getElementById('cote-moyen').innerText = moy;
                document.getElementById('cote-max').innerText = max;
            }, 150);
        }
    </script>
</body>
</html>
